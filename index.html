<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ステラ・ラーニング・アーカイブ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Orbitron:wght@400;700&display=swap');
        
        body { 
            font-family: 'Noto Sans JP', sans-serif;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: #e0e6ed;
        }

        .space-font { font-family: 'Orbitron', sans-serif; }

        /* アニメーションする星空の背景 */
        #stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .nebula-text {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-space {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
            transition: all 0.3s ease;
        }

        .btn-space:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.8);
        }

        /* カスタムスクロールバー */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #090a0f; }
        ::-webkit-scrollbar-thumb { background: #1e3a8a; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen">

    <!-- 星のコンテナ -->
    <div id="stars-container"></div>

    <!-- ヘッダー -->
    <header class="glass-panel border-b border-white/10 py-6 sticky top-0 z-40">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🚀</span>
                <div>
                    <h1 class="text-2xl font-bold space-font tracking-wider nebula-text">STELLA ARCHIVE</h1>
                    <p class="text-[10px] text-blue-300 uppercase tracking-[0.2em]">教材リソースセンター</p>
                </div>
            </div>
            <button onclick="toggleAdminModal()" class="text-xs space-font border border-blue-400/50 text-blue-300 hover:bg-blue-400/10 px-4 py-2 rounded-full transition">
                管理者メニュー
            </button>
        </div>
    </header>

    <main class="container mx-auto px-4 py-12">
        <div class="max-w-4xl mx-auto">
            
            <!-- 検索エリア -->
            <div class="mb-12 text-center">
                <h2 class="text-4xl font-bold mb-4 tracking-tight space-font uppercase">Space exploring</h2>
                <p class="text-gray-400 mb-8">キーワードを入力して、必要な教材やログをスキャンしてください。</p>
                <div class="relative group">
                    <input type="text" id="searchInput" placeholder="教材をスキャン中..." onkeyup="filterFiles()"
                           class="w-full bg-white/5 border border-white/10 px-6 py-4 rounded-2xl outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition text-lg glass-panel text-white">
                    <div class="absolute right-4 top-4 text-blue-400 opacity-50">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                </div>
            </div>

            <!-- ファイルリスト -->
            <div class="grid gap-6" id="fileList">
                <!-- JSで生成 -->
                <div id="noFilesMessage" class="text-center py-20 text-gray-500">
                    <p class="text-xl mb-2">📡 信号が検出されません</p>
                    <p class="text-sm">現在、アーカイブに公開されているリソースはありません。</p>
                </div>
            </div>
        </div>
    </main>

    <!-- 管理者ログインモーダル -->
    <div id="adminModal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="glass-panel rounded-3xl p-8 max-w-md w-full border border-blue-500/30">
            <h2 class="text-xl font-bold mb-4 space-font text-blue-400">管理者認証</h2>
            <p class="text-gray-400 mb-6 text-sm italic">システムをオーバーライドするために認証コードを入力してください。</p>
            <input type="password" id="adminPassword" placeholder="パスコード" 
                   class="w-full bg-black/40 border border-white/20 px-4 py-3 rounded-xl mb-6 outline-none focus:border-blue-500 text-center tracking-[0.5em] space-font text-white">
            <div class="flex gap-4">
                <button onclick="toggleAdminModal()" class="flex-1 py-3 text-gray-400 hover:text-white transition uppercase text-xs space-font">中断</button>
                <button onclick="checkPassword()" class="flex-1 py-3 btn-space text-white rounded-xl font-bold uppercase text-xs space-font">アクセス</button>
            </div>
        </div>
    </div>

    <!-- 管理パネル -->
    <div id="uploadArea" class="fixed inset-0 bg-[#090a0f] hidden overflow-y-auto z-50">
        <div class="container mx-auto px-4 py-8 max-w-4xl">
            <div class="flex justify-between items-center mb-12">
                <div>
                    <h2 class="text-3xl font-bold space-font nebula-text uppercase">コントロールパネル</h2>
                    <p class="text-xs text-gray-500 mt-1 tracking-widest uppercase">システム制御：有効</p>
                </div>
                <button onclick="logout()" class="text-red-400 hover:text-red-300 space-font text-sm border border-red-500/30 px-4 py-2 rounded-full uppercase">ログアウト</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <!-- 左側：新規アップロード -->
                <div class="md:col-span-1">
                    <div class="glass-panel p-6 rounded-3xl sticky top-8">
                        <h3 class="font-bold mb-6 flex items-center gap-2 text-blue-300 uppercase text-xs space-font">
                            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                            新規リソース追加
                        </h3>
                        <div class="space-y-6">
                            <div>
                                <label class="block text-[10px] text-blue-300 uppercase mb-2 ml-1 space-font font-bold">教材タイトル</label>
                                <input type="text" id="fileTitle" placeholder="タイトルを入力" class="w-full bg-white/5 border border-white/10 px-4 py-3 rounded-xl outline-none focus:border-blue-500 text-sm text-white">
                            </div>
                            <div>
                                <label class="block text-[10px] text-blue-300 uppercase mb-2 ml-1 space-font font-bold">ペイロード (PDF)</label>
                                <input type="file" id="fileInput" accept=".pdf" class="w-full text-[10px] text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-bold file:bg-blue-900 file:text-blue-100 hover:file:bg-blue-800 cursor-pointer">
                            </div>
                            <button onclick="handleUpload()" class="w-full btn-space text-white py-4 rounded-2xl font-bold text-sm tracking-widest uppercase space-font">
                                データを配信する
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 右側：管理リスト -->
                <div class="md:col-span-2">
                    <div class="glass-panel p-6 rounded-3xl min-h-[500px]">
                        <h3 class="text-sm font-bold mb-6 text-blue-300 uppercase space-font tracking-tighter">アーカイブ管理 (合計: <span id="fileCount">0</span>)</h3>
                        <div id="adminFileList" class="space-y-4">
                            <!-- JSで生成 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASS = "893012";
        let files = JSON.parse(localStorage.getItem('pdf_files')) || [];

        function createStars() {
            const container = document.getElementById('stars-container');
            const starCount = 150;
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
                container.appendChild(star);
            }
        }

        window.onload = () => {
            createStars();
            renderFiles();
        };

        function toggleAdminModal() {
            const modal = document.getElementById('adminModal');
            modal.classList.toggle('hidden');
            document.getElementById('adminPassword').value = '';
        }

        function checkPassword() {
            const pass = document.getElementById('adminPassword').value;
            if (pass === ADMIN_PASS) {
                document.getElementById('adminModal').classList.add('hidden');
                document.getElementById('uploadArea').classList.remove('hidden');
                renderAdminFiles();
            } else {
                alert("アクセス拒否：パスコードが一致しません。");
            }
        }

        function logout() {
            document.getElementById('uploadArea').classList.add('hidden');
        }

        function handleUpload() {
            const title = document.getElementById('fileTitle').value;
            const fileInput = document.getElementById('fileInput');
            
            if (!title || !fileInput.files[0]) {
                alert("タイトルとファイルの両方を入力してください。");
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = function(e) {
                const now = new Date();
                const newFile = {
                    id: Date.now(),
                    title: title.toUpperCase(),
                    fileName: file.name,
                    size: (file.size / 1024 / 1024).toFixed(2) + " MB",
                    date: now.toLocaleDateString('ja-JP') + " " + now.toLocaleTimeString('ja-JP', {hour: '2-digit', minute:'2-digit'}),
                    data: e.target.result
                };

                files.push(newFile);
                saveAndRender();
                
                document.getElementById('fileTitle').value = '';
                fileInput.value = '';
                alert("配信完了：アーカイブにリソースが追加されました。");
            };

            reader.readAsDataURL(file);
        }

        function deleteFile(id) {
            if (confirm("このデータをアーカイブから完全に抹消してもよろしいですか？")) {
                files = files.filter(f => f.id !== id);
                saveAndRender();
            }
        }

        function saveAndRender() {
            localStorage.setItem('pdf_files', JSON.stringify(files));
            renderFiles();
            renderAdminFiles();
        }

        function renderFiles() {
            const list = document.getElementById('fileList');
            const noFiles = document.getElementById('noFilesMessage');
            
            if (files.length === 0) {
                list.innerHTML = '';
                list.appendChild(noFiles);
                return;
            }

            list.innerHTML = files.map(file => `
                <div class="file-card glass-panel p-6 rounded-3xl flex items-center justify-between group hover:border-blue-500/50 transition-all duration-500">
                    <div class="flex items-center gap-6">
                        <div class="bg-blue-500/10 p-4 rounded-2xl text-blue-400 group-hover:scale-110 transition-transform">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                            </svg>
                        </div>
                        <div>
                            <h3 class="text-xl font-bold text-white group-hover:text-blue-300 transition tracking-wide">${file.title}</h3>
                            <div class="flex gap-4 mt-1">
                                <span class="text-[10px] space-font text-blue-400/70 uppercase">タイムスタンプ: ${file.date}</span>
                                <span class="text-[10px] space-font text-blue-400/70 uppercase">サイズ: ${file.size}</span>
                            </div>
                        </div>
                    </div>
                    <a href="${file.data}" download="${file.title}.pdf" class="btn-space text-white px-8 py-3 rounded-full font-bold text-sm tracking-widest uppercase space-font">
                        受信する
                    </a>
                </div>
            `).join('');
        }

        function renderAdminFiles() {
            const adminList = document.getElementById('adminFileList');
            document.getElementById('fileCount').innerText = files.length;

            if (files.length === 0) {
                adminList.innerHTML = '<p class="text-center text-gray-500 py-10 text-xs space-font uppercase">現在管理中のリソースはありません。</p>';
                return;
            }

            adminList.innerHTML = files.map(file => `
                <div class="bg-white/5 border border-white/10 p-4 rounded-2xl flex flex-col sm:flex-row sm:items-center justify-between gap-4 hover:bg-white/10 transition group">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-blue-400 text-[10px] font-bold space-font">#${file.id.toString().slice(-4)}</span>
                            <h4 class="font-bold text-white truncate text-sm">${file.title}</h4>
                        </div>
                        <div class="flex flex-wrap gap-x-4 gap-y-1 text-[9px] text-gray-400 uppercase font-bold">
                            <span>📄 ${file.fileName}</span>
                            <span>📅 ${file.date}</span>
                            <span>💾 ${file.size}</span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 shrink-0">
                        <a href="${file.data}" target="_blank" class="text-[9px] space-font text-blue-300 hover:text-white border border-blue-500/30 px-3 py-1.5 rounded-lg transition bg-blue-500/5">閲覧</a>
                        <button onclick="deleteFile(${file.id})" class="text-[9px] space-font text-red-400 hover:text-white border border-red-500/30 px-3 py-1.5 rounded-lg transition hover:bg-red-500/20 uppercase">消去</button>
                    </div>
                </div>
            `).sort((a,b) => b.id - a.id).join('');
        }

        function filterFiles() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.file-card');
            cards.forEach(card => {
                const title = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = title.includes(query) ? 'flex' : 'none';
            });
        }
    </script>
</body>
</html>
